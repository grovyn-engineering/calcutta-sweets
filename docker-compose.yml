services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calcutta_sweets
    volumes:
      - calcutta_pgdata:/var/lib/postgresql/data

volumes:
  calcutta_pgdata:
